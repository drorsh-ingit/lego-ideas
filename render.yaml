services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: lego-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lego-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lego-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: lego-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: lego-redis
          type: redis
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: BRICKOGNIZE_API_URL
        value: https://api.brickognize.com
      - key: SESSION_TTL_HOURS
        value: "24"
      # Set this to your frontend URL once deployed, e.g. https://lego-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://lego-frontend.onrender.com
    disk:
      name: uploads
      mountPath: /data/uploads
      sizeGB: 5

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  - type: worker
    name: lego-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lego-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lego-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: lego-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: lego-redis
          type: redis
          property: connectionString
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: BRICKOGNIZE_API_URL
        value: https://api.brickognize.com
    disk:
      name: worker-uploads
      mountPath: /data/uploads
      sizeGB: 5

  # ── Frontend ──────────────────────────────────────────────────────────────────
  - type: web
    name: lego-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # Replace with your actual backend URL once lego-backend is deployed
      - key: NEXT_PUBLIC_API_URL
        value: https://lego-backend.onrender.com/api/v1

  # ── Redis ─────────────────────────────────────────────────────────────────────
  - type: redis
    name: lego-redis
    plan: free
    ipAllowList: []

databases:
  - name: lego-postgres
    plan: free
    databaseName: legoideas
    user: lego
