services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: lego-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lego-postgres
          property: connectionString
      - key: BRICKOGNIZE_API_URL
        value: https://api.brickognize.com
      - key: SESSION_TTL_HOURS
        value: "24"
      # Set this to your frontend URL once deployed, e.g. https://lego-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://lego-frontend.onrender.com

  # ── Frontend ──────────────────────────────────────────────────────────────────
  - type: web
    name: lego-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # Replace with your actual backend URL once lego-backend is deployed
      - key: NEXT_PUBLIC_API_URL
        value: https://lego-backend.onrender.com/api/v1

databases:
  - name: lego-postgres
    plan: free
    databaseName: legoideas
    user: lego
